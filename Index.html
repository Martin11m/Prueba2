<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* menú */
nav{
    background:#333;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

nav a:hover{
    color:#00d9ff;
}

/* sección inicio */
.inicio{
    height:90vh;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.inicio h1{
    font-size:50px;
}

.boton{
    margin-top:20px;
    padding:12px 25px;
    background:white;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

.boton:hover{
    background:#333;
    color:white;
}

</style>
</head>

<body>

<nav>
<a href="#">Inicio</a>
<a href="#">Sobre mí</a>
<a href="#">Contacto</a>
</nav>

<section class="inicio">
<h1>Bienvenido</h1>
<p>Esta es mi página web</p>
<button class="boton">Explorar</button>
</section>

</body>
</html>
