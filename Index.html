<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    background:rgba(0,0,0,0.3);
    padding:40px;
    border-radius:15px;
}

h1{
    font-size:48px;
}

p{
    font-size:18px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#333;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#333;
    color:white;
}
</style>

</head>

<body>

<div class="container">
    <h1>👋 Hola</h1>
    <p>Bienvenido a mi página web</p>
    <button onclick="alert('Gracias por visitar!')">Haz clic</button>
</div>

</body>
</html>
